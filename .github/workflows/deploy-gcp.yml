name: Deploy to GCP — Cloud Run

# Triggers on every push to main, or manually via the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# ── Required GitHub secrets / variables ──────────────────────────────────────
# Secrets  (Settings → Secrets → Actions):
#   GCP_WORKLOAD_IDENTITY_PROVIDER  e.g. projects/123/locations/global/workloadIdentityPools/pool/providers/github
#   GCP_SERVICE_ACCOUNT             e.g. deployer@my-project.iam.gserviceaccount.com
#
# Variables (Settings → Variables → Actions):
#   GCP_PROJECT_ID     your GCP project ID
#   GCP_REGION         e.g. us-central1   (default: us-central1)
#   GCP_SERVICE_NAME   Cloud Run service name (default: geinel-portfolio)
#   GCP_AR_REPO        Artifact Registry repo name (default: portfolio)
# ─────────────────────────────────────────────────────────────────────────────

env:
  PROJECT_ID:   ${{ vars.GCP_PROJECT_ID }}
  REGION:       ${{ vars.GCP_REGION      || 'us-central1' }}
  SERVICE:      ${{ vars.GCP_SERVICE_NAME || 'geinel-portfolio' }}
  AR_REPO:      ${{ vars.GCP_AR_REPO     || 'portfolio' }}

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # needed for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate via Workload Identity Federation (no long-lived keys)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE }}:${{ github.sha }} \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push --all-tags \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region:  ${{ env.REGION }}
          image:   ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE }}:${{ github.sha }}
          flags:   --allow-unauthenticated --port=3000

      - name: Print service URL
        run: echo "Deployed → ${{ steps.deploy.outputs.url }}"
