name: Deploy to AWS — S3 + CloudFront

# Trigger manually from the Actions tab when ready to deploy.
on:
  workflow_dispatch:

# ── Required GitHub secrets / variables ──────────────────────────────────────
# Secrets  (Settings → Secrets → Actions):
#   AWS_ROLE_ARN       IAM role ARN (OIDC-based, no long-lived keys needed)
#                      e.g. arn:aws:iam::123456789012:role/github-actions-deployer
#
# Variables (Settings → Variables → Actions):
#   AWS_REGION                      e.g. us-east-1
#   AWS_S3_BUCKET                   e.g. geinel-portfolio
#   AWS_CLOUDFRONT_DISTRIBUTION_ID  e.g. E1ABCDEFGHIJKL  (leave blank to skip)
#   NEXT_PUBLIC_ASSET_PREFIX        e.g. https://d1234abcd.cloudfront.net
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  deploy:
    name: Build & Deploy to S3
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # needed for OIDC → AWS STS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NEXT_OUTPUT: export
          NEXT_PUBLIC_ASSET_PREFIX: ${{ vars.NEXT_PUBLIC_ASSET_PREFIX }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION || 'us-east-1' }}

      # Sync immutable static assets first (JS/CSS/fonts/images)
      - name: Sync static assets to S3
        run: |
          aws s3 sync out/ s3://${{ vars.AWS_S3_BUCKET }} \
            --delete \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable"

      # Sync HTML last so assets are already in place
      - name: Sync HTML to S3
        run: |
          aws s3 sync out/ s3://${{ vars.AWS_S3_BUCKET }} \
            --delete \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        if: ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
