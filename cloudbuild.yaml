# GCP Cloud Build — triggered by Cloud Build trigger connected to your repo.
#
# Two substitution variables control deployment target:
#   _DEPLOY_TARGET   "cloudrun" (default) | "gcs"
#   _BUCKET_NAME     GCS bucket name (only used when _DEPLOY_TARGET=gcs)
#   _SERVICE_NAME    Cloud Run service name
#   _REGION          GCP region, e.g. us-central1
#   _AR_REPO         Artifact Registry repository name

substitutions:
  _DEPLOY_TARGET: cloudrun
  _BUCKET_NAME:   geinel-portfolio
  _SERVICE_NAME:  geinel-portfolio
  _REGION:        us-central1
  _AR_REPO:       portfolio

steps:
  # ── Path A: Cloud Run (container) ──────────────────────────────────────────
  - id: docker-build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:$COMMIT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:latest
      - .

  - id: docker-push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME

  - id: cloudrun-deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:$COMMIT_SHA
      - --region
      - $_REGION
      - --allow-unauthenticated
      - --port=3000

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
